[general]
live_config_reload = true
import = [
    "~/.config/alacritty/themes/dracula.toml"
]

[window]
padding = { x = 0, y = 0 }
opacity = 0.85
blur = true
option_as_alt = "Both"

[scrolling]
history = 100000

[cursor]
style = "Block"

[font]
size = 12.0
offset = { x = 0, y = 2 }
normal = { family = "Moralerspace Neon", style="Regular" }
bold = { family = "Moralerspace Neon", style="Bold" }
italic = { family = "Moralerspace Neon", style="Italic" }
bold_italic = { family = "Moralerspace Neon", style="Bold Italic" }

[terminal]

[terminal.shell]
program = "/bin/sh"
args = ["-lc", "exec \"$HOME/.config/alacritty/launch-shell.sh\""]

# program = "/bin/zsh"
# args = ["--login", "-l", "-c", "tmux new-session -A -s main || tmux"]

[env]
TERM = "xterm-256color" # macOS | Linux

[keyboard]
[[keyboard.bindings]]
# cmd + ctrl + space to toggle vi mod
action = "ToggleViMode"
key = "Space"
mods = "Command|Control"


[[keyboard.bindings]]
# shift + enter で改行(Claude Code等のCSI u対応アプリ向け)
chars = "\u001b[13;2u"
key = "Return"
mods = "Shift"

# https://github.com/alacritty/alacritty/issues/7608
[[keyboard.bindings]]
chars = "\u001f"
key = "Slash"
mods = "Control"
